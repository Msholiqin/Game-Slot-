<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Akun</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daftar Akun Baru</h2>
    <div id="pesan"></div>
    <form id="formDaftar">
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit">Daftar Sekarang</button>
    </form>
    <p style="text-align:center; font-size:14px;">Sudah punya akun? <a href="index.html">Login di sini</a></p>
</div>

<script>
document.getElementById('formDaftar').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    // Simpan data ke dalam LocalStorage (Penyimpanan bawaan browser)
    localStorage.setItem('saved_username', user);
    localStorage.setItem('saved_password', pass);
    
    document.getElementById('pesan').innerHTML = "<p style='color: green;'>Pendaftaran sukses! Silakan klik Login.</p>";
});
</script>
</body>
</html>
